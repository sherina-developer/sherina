{% extends "base.html" %}
{% block title %}Login | MetaHealth{% endblock %}
{% block content %}
<section class="auth-card">
  <p class="kicker">MetaHealth</p>
  <h1>Welcome back</h1>
  <p class="subtitle">Login to access prediction history and risk analytics dashboard.</p>

  <form action="{{ url_for('login') }}" method="post" class="auth-form">
    <label>
      Username
      <input type="text" name="username" required />
    </label>
    <label>
      Password
      <input type="password" name="password" required />
    </label>
    <button type="submit">Login</button>
  </form>

  <p class="auth-link">New user? <a href="{{ url_for('register') }}">Create account</a></p>
</section>
{% endblock %}
